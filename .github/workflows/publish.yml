name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute tarball URL and sha256
        id: info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARBALL_URL="https://registry.npmjs.org/envize/-/envize-${VERSION}.tgz"
          # Give npm a moment to propagate
          sleep 15
          SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "tarball_url=$TARBALL_URL" >> $GITHUB_OUTPUT

      - name: Update Formula/envize.rb in homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          SHA256="${{ steps.info.outputs.sha256 }}"
          TARBALL_URL="${{ steps.info.outputs.tarball_url }}"

          # Fetch current file content and its git blob SHA
          RESPONSE=$(curl -sf -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            "https://api.github.com/repos/catoldcui/homebrew-envize/contents/Formula/envize.rb")
          FILE_SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          CURRENT=$(echo "$RESPONSE" | python3 -c "import sys,json,base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode())")

          # Patch version url and sha256 in the formula
          UPDATED=$(echo "$CURRENT" \
            | sed "s|url \"https://registry.npmjs.org/envize/-/envize-[^\"]*\"|url \"$TARBALL_URL\"|" \
            | sed "s|sha256 \"[^\"]*\"|sha256 \"$SHA256\"|")

          ENCODED=$(printf '%s' "$UPDATED" | base64 -w 0)

          curl -sf -X PUT \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/catoldcui/homebrew-envize/contents/Formula/envize.rb" \
            -d "{\"message\":\"chore: update envize formula to v${VERSION}\",\"content\":\"${ENCODED}\",\"sha\":\"${FILE_SHA}\"}"
